services:
  backend:
    build:
      context: ./backend
    container_name: backend-service
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    # Anonymous node_modules volume can hold a stale Prisma client after schema changes
    command: sh -c "npx prisma generate && npm run start:dev"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: frontend-service
    ports:
      - "${FRONT_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # npm install: le volume anonyme /app/node_modules peut rester obsolète après un changement de deps
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend
    restart: unless-stopped